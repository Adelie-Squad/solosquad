name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - run: npm ci
      - run: npm run build

      - name: npm audit (v0.8.1 — high-severity gate)
        # v0.8.1 §3.3 — fail the build on any high CVE. Moderate stays as a
        # warning so a new advisory doesn't block deploys before we triage it.
        run: npm audit --audit-level=high

      - name: Validate bundled SKILL.md frontmatter (v0.5)
        run: npm run validate-skills

      - name: Smoke test — global install + doctor
        shell: bash
        run: |
          npm install -g .
          solosquad doctor --ci || true
