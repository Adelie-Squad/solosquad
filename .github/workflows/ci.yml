name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      # Surface every job's real result instead of cancelling in-progress jobs
      # when one fails — a fail-fast cancel previously masked which combos pass.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 18 dropped: better-sqlite3 12.x requires Node 20+ (no Node 18
        # prebuilt → source build fails on runners without a toolchain). Matches
        # package.json engines `>=20`.
        node: [20, 22]
        exclude:
          # better-sqlite3 12.x ships no Windows prebuilt for Node 20 (ABI 115),
          # and the GitHub Windows runner has no Visual Studio toolchain for a
          # source build. Windows stays covered on Node 22 (prebuilt present).
          - os: windows-latest
            node: 20
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - run: npm ci
      - run: npm run build

      - name: npm audit (v0.8.1 — high-severity gate)
        # v0.8.1 §3.3 — fail the build on any high CVE. Moderate stays as a
        # warning so a new advisory doesn't block deploys before we triage it.
        run: npm audit --audit-level=high

      - name: npm audit (v1.3.1 — moderate visibility, non-blocking)
        # v1.3.1 §6③ — surface moderate advisories in the log without gating
        # (|| true). Keeps the triage-before-block policy of the high gate while
        # making a new moderate (e.g. the uuid/node-cron one) visible early.
        run: npm audit --audit-level=moderate || true

      - name: Validate bundled SKILL.md frontmatter (v0.5)
        run: npm run validate-skills

      - name: Smoke test — global install + doctor
        shell: bash
        run: |
          npm install -g .
          solosquad doctor --ci || true
