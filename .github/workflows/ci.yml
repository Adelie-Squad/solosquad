name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      # Surface every job's real result instead of cancelling in-progress jobs
      # when one fails — a fail-fast cancel previously masked which combos pass.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 20 dropped (v1.3.7): GitHub Actions deprecated the Node 20 runner
        # runtime (Sept 2025), and better-sqlite3 12.x is flakiest on the Node 20
        # ABI (115) — the ubuntu+node20 cell intermittently failed its native
        # build while every other cell passed the identical steps. Node 22
        # (current Active LTS) ships better-sqlite3 prebuilts for all three OSes,
        # so the former windows/node20 exclude is no longer needed. package.json
        # engines stays `>=20` (users may run 20); CI validates on 22.
        node: [22]
    runs-on: ${{ matrix.os }}

    steps:
      # checkout/setup-node v5 target the Node 24 action runtime — v4 targeted
      # Node 20, which GitHub now force-runs on Node 24 with a deprecation warning.
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - run: npm ci
      - run: npm run build

      - name: npm audit (v0.8.1 — high-severity gate)
        # v0.8.1 §3.3 — fail the build on any high CVE. Moderate stays as a
        # warning so a new advisory doesn't block deploys before we triage it.
        run: npm audit --audit-level=high

      - name: npm audit (v1.3.1 — moderate visibility, non-blocking)
        # v1.3.1 §6③ — surface moderate advisories in the log without gating
        # (|| true). Keeps the triage-before-block policy of the high gate while
        # making a new moderate (e.g. the uuid/node-cron one) visible early.
        run: npm audit --audit-level=moderate || true

      - name: Validate bundled assets (skills + agent graph + workflows + crons, v1.3.2)
        run: npm run validate-bundled

      - name: Smoke test — global install + doctor
        shell: bash
        run: |
          npm install -g .
          solosquad doctor --ci || true
