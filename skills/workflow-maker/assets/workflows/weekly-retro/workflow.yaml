# weekly-retro workflow template (v1.1).
#
# gstack /retro + /learn 결합. Chief 가 weekly cron (crons/weekly-
# retro.md) 에서 호출. shipping streak + confidence score 갱신 + skill/
# workflow refinement 제안 누적.
#
# 참조: v1.1 PRD §13.4
schema_version: 2
id: "weekly-retro"
name: "Weekly Retrospective"
description: "Chief weekly cycle close — metrics, patterns, refinement proposals. Outputs accumulate to memory/leading-indicators.jsonl."
template_id: "weekly-retro"
hard_gate: false

stages:
  - id: stage-1-metrics
    agent: product/data-analyst
    task: |
      Aggregate last 7d metrics from ledger + agent-costs.jsonl +
      chief-stage-events.jsonl. Compute per-contributor breakdown +
      shipping streak + avg Confidence Score. Append leading indicators
      to <org>/memory/leading-indicators.jsonl.
    inputs: []
    outputs:
      - weekly-metrics.json

  - id: stage-2-retrospective
    agent: _main/chief
    task: |
      Run retrospective skill. What worked / what didn't / patterns
      observed / action items. Owners + target dates assigned.
    inputs:
      - weekly-metrics.json
    outputs:
      - retro-summary.md
    handoff_to: stage-3-skill-refinement

  - id: stage-3-skill-refinement
    agent: _main/chief
    task: |
      Run skill-refinement skill. Top 3 high-friction skills + proposals.
      Approval required for changes affecting bundled SKILL.md files.
    inputs:
      - weekly-metrics.json
    outputs:
      - skill-refinement-proposals.md
    handoff_to: stage-4-workflow-refinement

  - id: stage-4-workflow-refinement
    agent: _main/chief
    task: |
      Run workflow-refinement skill. Bottleneck + handoff fidelity
      proposals. ≥2 approaches per proposal.
    inputs:
      - weekly-metrics.json
    outputs:
      - workflow-refinement-proposals.md
    handoff_to: null
