# pmf-validation workflow template (v1.1).
#
# Six Forcing Questions (gstack) + Demand Reality 증거 수집 → Narrowest
# Wedge 정의 → user interview spec → behavior metric. 각 stage 는 hard
# gate — 미달성 시 다음 stage 차단.
#
# 참조: v1.1 PRD §13.2
schema_version: 2
id: "pmf-validation"
name: "PMF Validation"
description: "Strict PMF gate sequence — Demand Reality, Narrowest Wedge, interview spec, behavior metric. Each stage hard-gated."
template_id: "pmf-validation"
hard_gate: true

stages:
  - id: stage-1-demand-reality
    agent: product/product-manager
    task: |
      Gather demand reality evidence from archive + customers.md + memory.
      HARD GATE: ≥3 distinct evidence pieces required. Interest signals
      (likes/clicks/asks) do NOT count — only actual demand (payment,
      repeat use, workaround behavior, urgent ask). Fewer than 3 → halt
      and append data_request open_questions.
    inputs: []
    outputs:
      - demand-evidence.md
    handoff_to: stage-2-narrowest-wedge
    exit_criteria:
      - "demand_evidence_count >= 3"
      - "all evidence is actual demand (not interest)"

  - id: stage-2-narrowest-wedge
    agent: product/product-manager
    task: |
      Define the narrowest, deepest wedge that this PMF could serve.
      Target: 1 segment, 1 job, 1 outcome. HARD GATE: wedge must be
      specific enough that you can name 3 real or plausible users by
      role+context. Cannot be defined → return to product-designer for further
      narrowing.
    inputs:
      - demand-evidence.md
    outputs:
      - wedge-spec.md
    handoff_to: stage-3-interview-spec
    exit_criteria:
      - "wedge target segment + job + outcome all named"
      - "3 archetypal users describable"

  - id: stage-3-interview-spec
    agent: product/researcher
    task: |
      Generate Mom-Test-based interview script targeting the wedge. Use
      interview-script skill. Script is for the founder to run with
      real customers — not for PM/Chief to use. Output: script + scoring
      rubric + minimum sample (≥5 interviews recommended).
    inputs:
      - wedge-spec.md
    outputs:
      - interview-script.md
      - scoring-rubric.md
    handoff_to: stage-4-behavior-metric
    exit_criteria:
      - "interview script free of leading questions (Mom Test check)"
      - "minimum sample defined"

  - id: stage-4-behavior-metric
    agent: product/data-analyst
    task: |
      Define behavior metric (NOT survey/intent metric) that confirms PMF.
      HARD GATE: must be observable behavior (e.g. day-7 retention,
      activation rate, repeat use within N days). Survey/satisfaction
      proxies forbidden as primary metric. Output: metric definition +
      baseline + target threshold + measurement window.
    inputs:
      - wedge-spec.md
      - interview-script.md
    outputs:
      - pmf-metric.yaml
    handoff_to: null
    exit_criteria:
      - "metric is observable behavior"
      - "baseline + target + window all set"
      - "Confidence Score >= 60"
