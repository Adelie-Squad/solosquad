# tdcc sub-workflow (v1.3.7 §3.6B — 구 tdcc skill 흡수).
#
# 본질 원칙: "원인을 측정 가능한 지표로 변환"은 판단 단위 — 후행지표·기회·인과를 잇고(방법),
# 측정 가능한 결론을 다음(가설 수립)으로 넘긴다(결론). 문제 성격이 *지표화 필요*일 때 선택.
schema_version: 2
id: "tdcc"
name: "TDCC (indicator mapping)"
description: "근본 원인을 Trailing indicator·Downstream problems·Customer opportunity·Causal link·Unknown 5필드로 매핑 → 측정 가능한 후행지표+기회를 가설 단계로. 원본 토스 TDCC(RO-PNA 변형). 문제 성격이 '원인을 지표로 만들어야' 할 때 선택."
template_id: "tdcc"
hard_gate: true

stages:
  - id: stage-1-map
    agent: product/product-manager
    task: |
      목표: 근본 원인(five-whys 산출 등)을 측정 가능한 지표·기회로 변환해 가설 단계로 넘긴다.

      방법(5필드):
        - Trailing indicator: metric + baseline + target (측정 가능해야).
        - Downstream problems: 선행 문제 3개(mece 의 선행 leaf).
        - Customer opportunity: 사용자 가치 + size(small/medium/large).
        - Causal link: 선행→후행 인과 사슬(선행 문제와 1:1 정합).
        - Unknown: 답할 수 없는 항목 → open_questions[](`{stage:"tdcc", type:"data_request"}`).

      결론(핸드오프): 측정 가능한 후행지표 + 기회 + 인과. 가설 단계(xyz-hypothesis skill 등)로 넘어간다.
    inputs: []
    outputs:
      - tdcc.md
    handoff_to: null
    exit_criteria:
      - "trailing_indicator has baseline + target (measurable)"
      - "causal_link maps 1:1 to downstream problems"
      - "all 5 fields filled or escalated to open_questions[]"
