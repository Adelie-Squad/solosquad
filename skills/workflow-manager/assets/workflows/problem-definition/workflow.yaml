# problem-definition workflow template (v1.2).
#
# 새 조직의 기본 시드 워크플로 (v1.2 directive #6). add-org 가
# <org>/workflows/problem-definition/ 으로 자동 복사.
#
# Chief 가 사용자 요청을 *문제 정의* 부터 시작해야 한다고 판단할 때
# (e.g. 초기 product 진입, 새 feature 의 근본 문제 재확인) 호출. PM 이
# problem-definition skill 의 6-phase chain (SCQA → 5-Whys → MECE → TDCC →
# XYZ → 1-pager PRD) 을 stage 별로 실행. 각 phase 산출이 다음 phase 입력.
#
# discovery-cycle 과의 차이: discovery-cycle 은 discovery → problem-def →
# opportunity-tree → hypothesis → prd → wbs 까지 *큰 cycle*. 본 workflow 는
# 문제 정의 그 자체에만 집중 — solo founder 가 *지금 풀어야 할 문제가
# 뭔지* 명확화하는 가장 가벼운 entry point.
#
# 참조:
#   - docs/prd/v1.2-messenger-connection-discord-first.md §12 #16
#   - skills/problem-definition/SKILL.md
#   - skills/problem-definition/assets/01~06 (각 phase 의 방법론 문서)
schema_version: 2
id: "problem-definition"
name: "Problem Definition (6-phase chain)"
description: "PM walks SCQA → 5-Whys → MECE → TDCC → XYZ Hypothesis → 1-pager PRD. Each phase outputs evidence-refs + open_questions[] for unanswerable fields."
template_id: "problem-definition"
hard_gate: true

stages:
  - id: stage-1-scqa
    agent: product/pmf-planner
    task: |
      Run problem-definition skill, Phase 1 (SCQA). Frame the user's
      request using Situation / Complication / Question / Answer (hypothesis).
      Reference assets/01-scqa.md. Unanswerable fields → append to
      <org>/memory/open-questions/{{task_id}}.json.
    inputs: []
    outputs:
      - scqa.json
    handoff_to: stage-2-five-whys

  - id: stage-2-five-whys
    agent: product/pmf-planner
    task: |
      Run problem-definition skill, Phase 2 (5 Whys). Drill from the
      Complication (Phase 1) down to root cause. Reference assets/02-five-whys.md.
      Each "why" must have an evidence-ref or open_question entry.
    inputs:
      - scqa.json
    outputs:
      - five-whys.json
    handoff_to: stage-3-mece

  - id: stage-3-mece
    agent: product/pmf-planner
    task: |
      Run problem-definition skill, Phase 3 (MECE). Decompose the root
      cause into Mutually Exclusive / Collectively Exhaustive branches.
      Reference assets/03-mece.md. Output a tree (depth ≥2, leaves
      actionable). Overlaps / gaps → open_questions[].
    inputs:
      - five-whys.json
    outputs:
      - mece-tree.json
    handoff_to: stage-4-tdcc

  - id: stage-4-tdcc
    agent: product/pmf-planner
    task: |
      Run problem-definition skill, Phase 4 (TDCC — Top-Down Categorize
      → Compare). For each MECE leaf, categorize the candidate solutions
      and compare on shared axes (cost, time-to-impact, reversibility).
      Reference assets/04-tdcc.md. Output: ranked candidate matrix.
    inputs:
      - mece-tree.json
    outputs:
      - tdcc-matrix.json
    handoff_to: stage-5-xyz

  - id: stage-5-xyz
    agent: product/pmf-planner
    task: |
      Run problem-definition skill, Phase 5 (XYZ Hypothesis). Convert
      top-ranked candidate(s) into falsifiable hypothesis: "We believe X
      will result in Y, measured by Z." Reference assets/05-xyz-hypothesis.md.
      Each hypothesis carries a riskiest-assumption tag (V/U/V/F).
    inputs:
      - tdcc-matrix.json
    outputs:
      - xyz-hypothesis.json
    handoff_to: stage-6-one-pager

  - id: stage-6-one-pager
    agent: product/pmf-planner
    task: |
      Run problem-definition skill, Phase 6 (1-pager PRD). Synthesize
      Phases 1–5 into a 1-page PRD: problem, users, why-now, hypothesis,
      success metric, riskiest assumption. Reference assets/06-one-pager-prd.md.
      HARD GATE: all earlier phases must have zero blocking open_questions[].
    inputs:
      - scqa.json
      - five-whys.json
      - mece-tree.json
      - tdcc-matrix.json
      - xyz-hypothesis.json
    outputs:
      - one-pager-prd.md
    handoff_to: null
