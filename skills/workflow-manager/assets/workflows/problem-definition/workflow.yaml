# problem-definition workflow template (v1.2; v1.3.5 framework-skill split).
#
# 새 조직의 기본 시드 워크플로 (v1.2 directive #6). add-org 가
# <org>/workflows/problem-definition/ 으로 자동 복사.
#
# Chief 가 사용자 요청을 *문제 정의* 부터 시작해야 한다고 판단할 때 호출. PM
# (product/pmf-planner)이 프레임워크 skill 체인을 stage 별로 실행. 각 phase
# 산출이 다음 phase 입력.
#
# v1.3.5 (PRD §3.2): 구 단일 `problem-definition` skill 이 5개 프레임워크 skill
# (scqa·five-whys·mece·tdcc·xyz-hypothesis)로 분리됐다. `problem-definition` 은
# 그 skill 들을 chain 하는 (서브)워크플로로 남는다(skill 아님). 1-pager 산출은
# prd-writer skill 이 담당.
#
# 참조:
#   - docs/prd/v1.3.5-planning-workflows.md §3.2
#   - skills/{scqa,five-whys,mece,tdcc,xyz-hypothesis}/SKILL.md
schema_version: 2
id: "problem-definition"
name: "Problem Definition (framework-skill chain)"
description: "PM walks scqa → five-whys → mece → tdcc → xyz-hypothesis → 1-pager PRD. Each stage outputs evidence-refs + open_questions[] for unanswerable fields."
template_id: "problem-definition"
hard_gate: true

stages:
  - id: stage-1-scqa
    agent: product/pmf-planner
    task: |
      Run the `scqa` skill. Frame the user's request using Situation /
      Complication / Question / Answer (hypothesis candidates). Unanswerable
      fields → append to <org>/memory/open-questions/{{task_id}}.json.
    inputs: []
    outputs:
      - scqa.json
    handoff_to: stage-2-five-whys

  - id: stage-2-five-whys
    agent: product/pmf-planner
    task: |
      Run the `five-whys` skill. Drill from the Complication (stage 1) down to
      a one-sentence root cause. Each "why" must have an evidence-ref or an
      open_question entry.
    inputs:
      - scqa.json
    outputs:
      - five-whys.json
    handoff_to: stage-3-mece

  - id: stage-3-mece
    agent: product/pmf-planner
    task: |
      Run the `mece` skill. Decompose the root cause into Mutually Exclusive /
      Collectively Exhaustive lagging + leading branches (leaves actionable).
      Overlaps / gaps → open_questions[].
    inputs:
      - five-whys.json
    outputs:
      - mece-tree.json
    handoff_to: stage-4-tdcc

  - id: stage-4-tdcc
    agent: product/pmf-planner
    task: |
      Run the `tdcc` skill. Map the leading problems to a measurable trailing
      indicator, customer opportunity, and causal link; escalate unknowns to
      open_questions[].
    inputs:
      - mece-tree.json
    outputs:
      - tdcc-matrix.json
    handoff_to: stage-5-xyz

  - id: stage-5-xyz
    agent: product/pmf-planner
    task: |
      Run the `xyz-hypothesis` skill. Convert the top candidate(s) into
      falsifiable "X% of Y will Z within T, because R" hypotheses (≥2 approaches),
      each with a riskiest-assumption tag (V/U/V/F) and falsification conditions.
    inputs:
      - tdcc-matrix.json
    outputs:
      - xyz-hypothesis.json
    handoff_to: stage-6-one-pager

  - id: stage-6-one-pager
    agent: product/pmf-planner
    task: |
      Run the `prd-writer` skill. Synthesize stages 1–5 into a 1-page PRD:
      problem, users, why-now, hypothesis, success metric, riskiest assumption.
      HARD GATE: all earlier stages must have zero blocking open_questions[].
    inputs:
      - scqa.json
      - five-whys.json
      - mece-tree.json
      - tdcc-matrix.json
      - xyz-hypothesis.json
    outputs:
      - one-pager-prd.md
    handoff_to: null
