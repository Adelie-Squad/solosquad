# experiments/<id>/manifest.yaml — v1.1 template.
#
# Generated by `skills/experiment-design`. Lives at:
#   <org>/experiments/exp-YYYY-MM-DD-<slug>/manifest.yaml
#
# data-analyst reads this for daily anomaly detection (Amplitude pattern).

experiment_id: "{{exp-YYYY-MM-DD-slug}}"

hypothesis:
  xyz: "[X%] of [Y segment] will [Z behavior] within [T], because [R]"
  source_pr: "{{<org>/workflows/wf-.../PRD.md path}}"
  confidence_score_baseline: 0

variants:
  - id: control
    description: "current behavior"
    traffic_pct: 50
  - id: treatment
    description: "{{describe the change}}"
    traffic_pct: 50

metrics:
  primary:
    name: "{{metric name}}"
    formula: "{{measurable formula}}"
    direction: increase   # or decrease
    threshold: "{{absolute or relative target}}"

  secondary:
    - name: "{{secondary metric}}"
      formula: "..."

  guardrail:
    - name: "{{guardrail metric — must NOT regress}}"
      formula: "..."
      max_acceptable_regression_pct: 2

design:
  type: ab_test       # ab_test | feature_flag | concierge | wizard_of_oz | fake_door
  duration_days: 14
  min_sample: 1000
  power: 0.8
  alpha: 0.05
  start_at: "{{ISO 8601}}"
  end_at: "{{ISO 8601 — computed}}"

gates:
  start:
    - "instrumentation verified by qa"
    - "guardrail baselines stable for 7d"
  stop_early:
    - "guardrail breach > max_acceptable_regression_pct"
    - "primary metric Δ p < 0.01 with positive effect"
  end:
    - "min_sample reached"
    - "duration_days reached"

evidence_refs: []

# Daily anomaly detection (Amplitude pattern, data-analyst):
#   1. natural language → query → numeric
#   2. anomaly detection vs baseline
#   3. significance check
#   4. recommend (continue / stop / pivot)
