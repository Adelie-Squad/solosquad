services:
  bot:
    build: .
    image: solosquad:latest
    container_name: solosquad-bot
    restart: unless-stopped
    env_file: .env
    working_dir: /workspace
    environment:
      - REPOS_BASE_PATH=/repos
      - TZ=${TZ:-Asia/Seoul}
    volumes:
      # Workspace contents (agents, routines, core, templates, orchestrator, .env, memory, ...)
      - .:/workspace
      # Product repos tree
      - ${REPOS_BASE_PATH:-./repos}:/repos
      # Claude Code CLI authentication from host
      # macOS/Linux default: ${HOME}/.claude
      # Override via CLAUDE_AUTH_DIR in .env if creds live elsewhere.
      - ${CLAUDE_AUTH_DIR:-${HOME}/.claude}:/root/.claude
    command: ["solosquad", "bot"]

  scheduler:
    build: .
    image: solosquad:latest
    container_name: solosquad-scheduler
    restart: unless-stopped
    env_file: .env
    working_dir: /workspace
    environment:
      - REPOS_BASE_PATH=/repos
      - TZ=${TZ:-Asia/Seoul}
    volumes:
      - .:/workspace
      - ${REPOS_BASE_PATH:-./repos}:/repos
      - ${CLAUDE_AUTH_DIR:-${HOME}/.claude}:/root/.claude
    command: ["solosquad", "schedule"]
