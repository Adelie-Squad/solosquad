# v0.6 §2.2 — Organization Layer Specialization (`agent-profile.yaml`).
#
# This is a *modifier* file. 25 specialist SKILL.md files stay immutable
# in the workspace bundle; org-specific tone, priorities, and budget caps
# layer on top here.
#
# Three-tier inheritance:
#   1. workspace bundle defaults  (`.solosquad/agent-profile-defaults.yaml`)
#   2. user global               (`~/.solosquad/agent-profile-defaults.yaml`)
#   3. org agent-profile         (this file)
#
# Same-keyed values: narrower scope wins (org > user > workspace bundle).
#
# Budget invariant: agent-level overrides may only *tighten* the parent
# defaults. A wider override is rejected with a warning at load-time so a
# single agent cannot escape the cross-agent ceiling.

schema_version: 1

defaults:
  # Free-form fields below. Add anything your org cares about; the spawn
  # assembler streams unknown keys through to the agent prompt verbatim.
  # tone: conservative
  # priorities: [profitability, risk-mitigation]
  # excluded_recommendations: ["VC fundraising"]
  budget:
    daily_usd: 5
    weekly_usd: 25
    on_cap_action: pause

# Example per-agent override — uncomment after the migration adds entries
# from your v0.5 analysis-ledger.
#
# business-strategist:
#   emphasis: "한국 SMB 시장 컨텍스트 우선"
#   decision_frame: "현금흐름 > 성장률"
#
# content-writer:
#   voice: "professional, no hype"
#   ban_phrases: ["혁신적인", "획기적인"]
