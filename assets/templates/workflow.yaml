# Workflow chain template — v0.5 §9 #15.
#
# Used by the author loop (non spec-gate path) and the analyze-repo applier to
# materialize multi-stage chains. Each stage is one PM `Task` call; stages run
# sequentially and pass `_handoff.md` between them.
#
# Field meaning:
#   id            kebab-case identifier, unique per org
#   name          human-readable label
#   description   1-line summary shown in `solosquad workflow list`
#   stages[]      ordered list — must have ≥ 1 stage
#     id          kebab-case, unique within the workflow
#     agent       "<team>/<agent>" — must resolve to a SKILL.md
#     task        instruction passed to the agent (string, supports
#                 placeholders like {{user_input}})
#     inputs      list of `_handoff.md` keys consumed from prior stages
#     outputs     artifact names produced (relative to the stage's dir)
#     handoff_to  next stage id (omit on the final stage)
schema_version: 1
id: "{{workflow-id-kebab}}"
name: "{{Display name}}"
description: "{{1-line summary}}"
stages:
  - id: stage-1-research
    agent: experience/desk-researcher
    task: "{{instruction for stage 1}}"
    inputs: []
    outputs:
      - research-notes.md
    handoff_to: stage-2-plan
  - id: stage-2-plan
    agent: strategy/feature-planner
    task: "{{instruction for stage 2}}"
    inputs:
      - research-notes.md
    outputs:
      - PRD.md
